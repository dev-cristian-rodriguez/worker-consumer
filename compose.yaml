services:

  mongodb:
    image: mongo:7.0
    container_name: worker-consumer-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: messaging_user
      MONGO_INITDB_ROOT_PASSWORD: messaging_pass
      MONGO_INITDB_DATABASE: messaging_db
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 10

  mongo-express:
    image: mongo-express
    container_name: worker-consumer-mongo-express
    ports:
      - "8083:8081"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: messaging_user
      ME_CONFIG_MONGODB_ADMINPASSWORD: messaging_pass
      ME_CONFIG_MONGODB_URL: mongodb://messaging_user:messaging_pass@mongodb:27017/
    depends_on:
      mongodb:
        condition: service_healthy

  worker-consumer:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: worker-consumer-app
    ports:
      - "8081:8081"
    environment:
      MONGO_HOST: mongodb
      MONGO_PORT: 27017
      MONGO_USER: messaging_user
      MONGO_PASSWORD: messaging_pass
      MONGO_DATABASE: messaging_db
      RABBITMQ_HOST: host.docker.internal
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: guest
      RABBITMQ_PASSWORD: guest
    depends_on:
      mongodb:
        condition: service_healthy

volumes:
  mongo-data:
